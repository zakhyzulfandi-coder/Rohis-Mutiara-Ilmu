<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Rohis Ikhwah</title>
    
    <link rel="manifest" href="manifest.json" />
    <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/zakhyzulfandi-coder/Rohis-Mutiara-Ilmu/main/logorohis.jpg" />
    <meta name="theme-color" content="#2c3e50" />

    <style>
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background-color: #eee;
        overflow: hidden; 
        touch-action: manipulation; 
      }

      .iframe-container {
        display: none; 
        width: 100%;
        height: 100dvh; 
        position: relative; /* Penting untuk posisi loader */
        overflow: hidden;
      }

      /* --- CSS UNTUK LOADING SCREEN --- */
      #appLoader {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: #eee; /* Warna latar belakang loading */
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 50; /* Di atas iframe, tapi di bawah overlay pemblokir */
        font-family: sans-serif;
      }

      /* Animasi Putar (Spinner) */
      .spinner {
        border: 4px solid rgba(44, 62, 80, 0.2);
        width: 40px;
        height: 40px;
        border-radius: 50%;
        border-left-color: #2c3e50;
        animation: spin 1s linear infinite;
        margin-bottom: 15px;
      }

      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      /* --------------------------------- */

      iframe {
        display: block;
        width: 100%;
        height: 100%; 
        border: none;
      }

      #overlay {
        display: none;
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        background: rgba(44, 62, 80, 0.95); 
        z-index: 999;
      }

      #installPopUp {
        position: absolute; 
        top: 50%; 
        left: 50%; 
        transform: translate(-50%, -50%); 
        background: #fff; 
        padding: 30px 25px; 
        box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
        border-radius: 12px; 
        text-align: center;
        width: 80%;
        max-width: 320px;
        font-family: sans-serif;
      }

      #btnInstall {
        background: #2c3e50; 
        color: white; 
        border: none; 
        padding: 12px 24px; 
        border-radius: 6px; 
        cursor: pointer; 
        font-weight: bold;
        font-size: 16px;
        margin-top: 15px;
        width: 100%;
      }

      #resetLink {
        margin-top: 20px;
        font-size: 12px;
        color: #3498db;
        cursor: pointer;
        text-decoration: underline;
        display: none;
      }
    </style>
  </head>
  <body>
    <div class="iframe-container" id="appContainer">
      
      <div id="appLoader">
        <div class="spinner"></div>
        <p style="color: #2c3e50; font-weight: bold; margin: 0;">Memuat Rohis Ikhwah...</p>
      </div>

      <iframe
        id="app"
        src="https://script.google.com/a/macros/mutiarailmu.sch.id/s/AKfycbzdTaJFJFNHH_sISxZDEk8nX0W9BAOqcKKYzfkNwY-aNvS-b3YKVed1d82vMGwABwatPg/exec"
        scrolling="yes"
        allowfullscreen="true"
        webkitallowfullscreen="true"
        mozallowfullscreen="true"
        allow="fullscreen; camera; microphone; display-capture; geolocation"
        onload="sembunyikanLoader()" 
      >
      </iframe>
    </div>

    <div id="overlay">
      <div id="installPopUp">
        <p id="popupTitle" style="margin: 0 0 10px 0; color: #2c3e50; font-weight: bold; font-size: 20px;">Aplikasi Rohis Ikhwah</p>
        <p id="popupDesc" style="margin: 0 0 15px 0; color: #555; font-size: 14px; line-height: 1.5;">Memuat sistem...</p>
        <button id="btnInstall" style="display: none;">Install</button>
        <p id="resetLink">Saya sudah menghapus aplikasi (Install Ulang)</p>
      </div>
    </div>

    <script>
      // Fungsi untuk menyembunyikan loader saat iframe selesai dimuat
      function sembunyikanLoader() {
        const loader = document.getElementById('appLoader');
        if (loader) {
          // Memberikan sedikit transisi halus (opsional)
          loader.style.transition = "opacity 0.3s ease";
          loader.style.opacity = "0";
          setTimeout(() => {
            loader.style.display = 'none';
          }, 300);
        }
      }

      // 1. Registrasi Service Worker
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('sw.js')
            .catch(err => console.log('PWA Error:', err));
        });
      }

      // Variabel Elemen DOM
      let deferredPrompt;
      const appContainer = document.getElementById('appContainer');
      const overlay = document.getElementById('overlay');
      const btnInstall = document.getElementById('btnInstall');
      const popupTitle = document.getElementById('popupTitle');
      const popupDesc = document.getElementById('popupDesc');
      const resetLink = document.getElementById('resetLink');

      // 2. Deteksi Lingkungan
      const userAgent = navigator.userAgent || navigator.vendor || window.opera;
      const isAndroid = /android/i.test(userAgent);
      const isIOS = /iPad|iPhone|iPod/.test(userAgent) && !window.MSStream;
      const isMobile = isAndroid || isIOS;
      
      const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;
      const isInstalledFlag = localStorage.getItem('pwa_installed') === 'true';

      // 3. Logika Mode Aplikasi Ketat
      if (!isMobile) {
        appContainer.style.display = 'block';
      } else {
        if (isStandalone) {
          appContainer.style.display = 'block';
          localStorage.setItem('pwa_installed', 'true');
        } else {
          overlay.style.display = 'block';

          if (isInstalledFlag) {
            popupTitle.innerHTML = 'Aplikasi Telah Diunduh';
            popupDesc.innerHTML = 'Akses melalui browser web tidak diizinkan. Silakan buka aplikasi yang telah di unduh di layar utama HP Anda.';
            btnInstall.style.display = 'none';
            resetLink.style.display = 'block'; 
          } else {
            if (isIOS) {
              popupTitle.innerHTML = 'Install Diperlukan';
              popupDesc.innerHTML = 'Tekan ikon <b>Share (Bagikan)</b> di menu browser bawah, lalu pilih <b>"Add to Home Screen"</b> untuk menggunakan aplikasi.';
              btnInstall.style.display = 'none';
            } else {
              popupTitle.innerHTML = 'Install Diperlukan';
              popupDesc.innerHTML = 'Anda wajib menginstal aplikasi ini ke HP Anda untuk dapat menggunakannya.';
              btnInstall.style.display = 'block';
            }
          }
        }
      }

      // 4. Deteksi Otomatis Jika di Uninstall (KHUSUS ANDROID)
      window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        
        localStorage.removeItem('pwa_installed');
        
        if (!isStandalone) {
          popupTitle.innerHTML = 'Install Diperlukan';
          popupDesc.innerHTML = 'Anda wajib menginstal aplikasi ini ke HP Anda untuk dapat menggunakannya.';
          btnInstall.style.display = 'block';
          resetLink.style.display = 'none'; 
        }
      });

      // 5. Aksi Tombol Reset Manual
      resetLink.addEventListener('click', () => {
        localStorage.removeItem('pwa_installed'); 
        location.reload(); 
      });

      // 6. Aksi tombol Install
      btnInstall.addEventListener('click', async () => {
        if (!deferredPrompt) {
          alert('Sistem instalasi sedang disiapkan oleh browser. Harap tunggu beberapa detik lalu klik lagi.');
          return;
        }

        deferredPrompt.prompt();
        const { outcome } = await deferredPrompt.userChoice;
        
        if (outcome === 'accepted') {
          localStorage.setItem('pwa_installed', 'true');
          popupTitle.innerHTML = 'Instalasi Berhasil';
          popupDesc.innerHTML = 'Silakan tutup browser ini dan buka aplikasi yang telah di unduh di layar utama Anda.';
          btnInstall.style.display = 'none';
        }
        deferredPrompt = null;
      });

      window.addEventListener('appinstalled', () => {
        localStorage.setItem('pwa_installed', 'true');
        popupTitle.innerHTML = 'Instalasi Selesai';
        popupDesc.innerHTML = 'Silakan tutup browser ini dan buka aplikasi yang telah di unduh di layar utama Anda.';
        btnInstall.style.display = 'none';
      });
    </script>
  </body>
</html>
