<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Rohis Ikhwah</title>

<link rel="manifest" href="manifest.json">

<link rel="icon"
href="https://raw.githubusercontent.com/zakhyzulfandi-coder/Rohis-Mutiara-Ilmu/main/logorohis.jpg">

<link rel="apple-touch-icon"
href="https://raw.githubusercontent.com/zakhyzulfandi-coder/Rohis-Mutiara-Ilmu/main/logorohis.jpg">

<meta name="theme-color" content="#2c3e50">

<style>

/* RESET */

html,body{
margin:0;
padding:0;
width:100%;
height:100%;
overflow:hidden;
font-family:sans-serif;
background:#2c3e50;
}

/* SPLASH SCREEN */

#splash{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#2c3e50;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
color:white;
z-index:9999;
}

#splash img{
width:90px;
margin-bottom:15px;
}

.loader{
border:4px solid rgba(255,255,255,0.3);
border-top:4px solid white;
border-radius:50%;
width:35px;
height:35px;
animation:spin 1s linear infinite;
margin-top:20px;
}

@keyframes spin{
0%{transform:rotate(0)}
100%{transform:rotate(360deg)}
}

/* IFRAME */

#app{
display:none;
width:100%;
height:100vh;
border:none;
}

/* INSTALL POPUP */

#installBox{
display:none;
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:white;
padding:15px 20px;
border-radius:10px;
box-shadow:0 8px 20px rgba(0,0,0,0.3);
width:85%;
max-width:320px;
z-index:999;
text-align:center;
}

#installBtn{
margin-top:10px;
padding:10px 15px;
background:#2c3e50;
border:none;
color:white;
border-radius:6px;
cursor:pointer;
font-size:15px;
}

</style>

</head>

<body>

<!-- SPLASH -->

<div id="splash">

<img src="https://raw.githubusercontent.com/zakhyzulfandi-coder/Rohis-Mutiara-Ilmu/main/logorohis.jpg">

<h2>Rohis Ikhwah</h2>

<div class="loader"></div>

</div>

<!-- APP -->

<iframe
id="app"
src="https://script.google.com/a/macros/mutiarailmu.sch.id/s/AKfycbzdTaJFJFNHH_sISxZDEk8nX0W9BAOqcKKYzfkNwY-aNvS-b3YKVed1d82vMGwABwatPg/exec">
</iframe>

<!-- INSTALL POPUP -->

<div id="installBox">

<div>
Install aplikasi Rohis Ikhwah agar lebih mudah digunakan.
</div>

<button id="installBtn">
Install Sekarang
</button>

</div>

<script>

/* SPLASH CONTROL */

setTimeout(()=>{

document.getElementById("splash").style.display="none"
document.getElementById("app").style.display="block"

},2000)

/* SERVICE WORKER */

if("serviceWorker" in navigator){

navigator.serviceWorker.register("/Rohis-Mutiara-Ilmu/sw.js")
.then(()=>console.log("SW aktif"))
.catch(err=>console.log(err))

}

/* INSTALL PROMPT */

let deferredPrompt

const installBox=document.getElementById("installBox")
const installBtn=document.getElementById("installBtn")

window.addEventListener("beforeinstallprompt",(e)=>{

e.preventDefault()

deferredPrompt=e

installBox.style.display="block"

})

installBtn.addEventListener("click",async()=>{

if(!deferredPrompt){
alert("Browser belum siap untuk instalasi")
return
}

deferredPrompt.prompt()

const {outcome}=await deferredPrompt.userChoice

if(outcome==="accepted"){

installBox.style.display="none"

}

deferredPrompt=null

})

window.addEventListener("appinstalled",()=>{

installBox.style.display="none"

console.log("Aplikasi berhasil diinstall")

})

</script>

</body>

</html>
