<!DOCTYPE html>
<html lang="id">

<head>
<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Rohis Ikhwah</title>

<link rel="icon"
href="https://raw.githubusercontent.com/zakhyzulfandi-coder/Rohis-Mutiara-Ilmu/main/logorohis.jpg">

<!-- PWA -->
<link rel="manifest" href="manifest.json">

<link rel="apple-touch-icon"
href="https://raw.githubusercontent.com/zakhyzulfandi-coder/Rohis-Mutiara-Ilmu/main/logorohis.jpg">

<meta name="theme-color" content="#2c3e50">

<style>

html,body{
margin:0;
padding:0;
width:100%;
height:100%;
overflow:hidden;
background:#eee;
font-family:sans-serif;
}

/* iframe */

.iframe-container{
width:100%;
height:100vh;
}

iframe{
width:100%;
height:100%;
border:none;
}

/* overlay */

#overlay{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#2c3e50;
z-index:999;
}

#popup{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:#fff;
padding:25px;
border-radius:12px;
width:85%;
max-width:320px;
text-align:center;
box-shadow:0 10px 25px rgba(0,0,0,0.4);
}

#installBtn{
background:#2c3e50;
color:#fff;
border:none;
padding:12px 20px;
border-radius:6px;
cursor:pointer;
font-size:16px;
margin-top:15px;
width:100%;
}

</style>

</head>

<body>

<div class="iframe-container">

<iframe
src="https://script.google.com/a/macros/mutiarailmu.sch.id/s/AKfycbzdTaJFJFNHH_sISxZDEk8nX0W9BAOqcKKYzfkNwY-aNvS-b3YKVed1d82vMGwABwatPg/exec"
allow="fullscreen; camera; microphone; display-capture; geolocation; gyroscope; accelerometer; magnetometer; microphone"
></iframe>

</div>

<!-- popup install -->

<div id="overlay">

<div id="popup">

<h3>Aplikasi Rohis Ikhwah</h3>

<p id="desc">
Agar aplikasi dapat digunakan di HP,
silakan install terlebih dahulu.
</p>

<button id="installBtn">
Install Aplikasi
</button>

</div>

</div>

<script>

/* SERVICE WORKER */

if("serviceWorker" in navigator){

window.addEventListener("load",()=>{

navigator.serviceWorker.register("/Rohis-Mutiara-Ilmu/sw.js")
.then(()=>console.log("SW aktif"))
.catch(err=>console.log(err))

})

}

/* INSTALL PROMPT */

let deferredPrompt

const overlay=document.getElementById("overlay")
const installBtn=document.getElementById("installBtn")

window.addEventListener("beforeinstallprompt",(e)=>{

e.preventDefault()

deferredPrompt=e

overlay.style.display="block"

})

installBtn.addEventListener("click",async()=>{

if(!deferredPrompt){
alert("Browser belum siap untuk instalasi")
return
}

deferredPrompt.prompt()

const {outcome}=await deferredPrompt.userChoice

if(outcome==="accepted"){

overlay.style.display="none"

}

deferredPrompt=null

})

window.addEventListener("appinstalled",()=>{

overlay.style.display="none"

console.log("PWA terinstall")

})

/* INTERAKSI USER */

document.body.addEventListener("click",()=>{})

</script>

</body>

</html>
