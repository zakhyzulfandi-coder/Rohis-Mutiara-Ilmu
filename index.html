<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rohis Ikhwah</title>
    
    <link rel="manifest" href="manifest.json" />
    <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/zakhyzulfandi-coder/Rohis-Mutiara-Ilmu/main/logorohis.jpg" />
    <meta name="theme-color" content="#2c3e50" />

    <style>
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background-color: #eee;
        overflow: hidden; 
      }

      /* Container Iframe disembunyikan secara default untuk mencegah website "ngintip" sebelum dicek */
      .iframe-container {
        display: none; 
        width: 100%;
        height: 100dvh; 
        overflow: hidden;
      }

      iframe {
        display: block;
        width: 100%;
        height: 100%; 
        border: none;
      }

      /* Latar Belakang Gelap untuk Memblokir Website */
      #overlay {
        display: none;
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        background: rgba(44, 62, 80, 0.95); /* Warna biru gelap transparan */
        z-index: 999;
      }

      /* Pop-up di posisi presisi tengah layar */
      #installPopUp {
        position: absolute; 
        top: 50%; 
        left: 50%; 
        transform: translate(-50%, -50%); 
        background: #fff; 
        padding: 30px 25px; 
        box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
        border-radius: 12px; 
        text-align: center;
        width: 80%;
        max-width: 320px;
        font-family: sans-serif;
      }

      #btnInstall {
        background: #2c3e50; 
        color: white; 
        border: none; 
        padding: 12px 24px; 
        border-radius: 6px; 
        cursor: pointer; 
        font-weight: bold;
        font-size: 16px;
        margin-top: 15px;
        width: 100%;
      }
    </style>
  </head>
  <body>
    <div class="iframe-container" id="appContainer">
      <iframe
        id="app"
        src="https://script.google.com/a/macros/mutiarailmu.sch.id/s/AKfycbzdTaJFJFNHH_sISxZDEk8nX0W9BAOqcKKYzfkNwY-aNvS-b3YKVed1d82vMGwABwatPg/exec"
        scrolling="yes"
        allowfullscreen="true"
        webkitallowfullscreen="true"
        mozallowfullscreen="true"
        allow="fullscreen; camera; microphone; display-capture; geolocation"
      >
      </iframe>
    </div>

    <div id="overlay">
      <div id="installPopUp">
        <p id="popupTitle" style="margin: 0 0 10px 0; color: #2c3e50; font-weight: bold; font-size: 20px;">Aplikasi Rohis Ikhwah</p>
        <p id="popupDesc" style="margin: 0 0 15px 0; color: #555; font-size: 14px; line-height: 1.5;">Memuat sistem...</p>
        <button id="btnInstall" style="display: none;">Install</button>
      </div>
    </div>

    <script>
      // 1. Registrasi Service Worker
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('sw.js')
            .catch(err => console.log('PWA Error:', err));
        });
      }

      // Variabel Elemen DOM
      let deferredPrompt;
      const appContainer = document.getElementById('appContainer');
      const overlay = document.getElementById('overlay');
      const btnInstall = document.getElementById('btnInstall');
      const popupTitle = document.getElementById('popupTitle');
      const popupDesc = document.getElementById('popupDesc');

      // 2. Deteksi Lingkungan
      const userAgent = navigator.userAgent || navigator.vendor || window.opera;
      const isAndroid = /android/i.test(userAgent);
      const isIOS = /iPad|iPhone|iPod/.test(userAgent) && !window.MSStream;
      const isMobile = isAndroid || isIOS;
      
      // Deteksi apakah sedang dibuka di dalam Aplikasi (Standalone)
      const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;
      
      // Cek memori lokal apakah sudah pernah menginstal
      const isInstalledFlag = localStorage.getItem('pwa_installed') === 'true';

      // 3. Logika Mode Aplikasi Ketat
      if (!isMobile) {
        // JIKA DI DESKTOP/LAPTOP: Tampilkan website secara normal
        appContainer.style.display = 'block';
      } else {
        // JIKA DI HP (ANDROID/IOS)
        if (isStandalone) {
          // Buka di dalam aplikasi: Tampilkan Iframe dan simpan memori sukses install
          appContainer.style.display = 'block';
          localStorage.setItem('pwa_installed', 'true');
        } else {
          // Buka lewat browser HP: Blokir tampilan website!
          overlay.style.display = 'block';

          if (isInstalledFlag) {
            // Jika sudah pernah menginstal tapi mencoba buka di browser lagi
            popupTitle.innerHTML = 'Aplikasi Telah Diunduh';
            popupDesc.innerHTML = 'Akses melalui browser web tidak diizinkan. Silakan buka aplikasi yang telah di unduh di layar utama HP Anda.';
            btnInstall.style.display = 'none'; // Sembunyikan tombol
          } else {
            // Belum menginstal: Paksa Install
            if (isIOS) {
              popupTitle.innerHTML = 'Install Diperlukan';
              popupDesc.innerHTML = 'Tekan ikon <b>Share (Bagikan)</b> di menu browser bawah, lalu pilih <b>"Add to Home Screen"</b> untuk menggunakan aplikasi.';
              btnInstall.style.display = 'none'; // Tombol install tidak berfungsi di iOS, jadi disembunyikan
            } else {
              popupTitle.innerHTML = 'Install Diperlukan';
              popupDesc.innerHTML = 'Anda wajib menginstal aplikasi ini ke HP Anda untuk dapat menggunakannya.';
              btnInstall.style.display = 'block'; // Tampilkan tombol untuk Android
            }
          }
        }
      }

      // 4. Menyiapkan Event Install Android
      window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
      });

      // 5. Aksi saat tombol Install diklik (Hanya Android)
      btnInstall.addEventListener('click', async () => {
        if (!deferredPrompt) {
          alert('Sistem instalasi sedang disiapkan oleh browser. Harap tunggu beberapa detik lalu klik lagi.');
          return;
        }

        // Tampilkan dialog install bawaan Android
        deferredPrompt.prompt();
        const { outcome } = await deferredPrompt.userChoice;
        
        if (outcome === 'accepted') {
          // Jika sukses install, langsung blokir website dan suruh buka aplikasinya
          localStorage.setItem('pwa_installed', 'true');
          popupTitle.innerHTML = 'Instalasi Berhasil';
          popupDesc.innerHTML = 'Silakan tutup browser ini dan buka aplikasi yang telah di unduh di layar utama Anda.';
          btnInstall.style.display = 'none'; // Hilangkan tombol
        }
        deferredPrompt = null;
      });

      // Deteksi tambahan jika sistem menginstal secara otomatis di latar belakang
      window.addEventListener('appinstalled', () => {
        localStorage.setItem('pwa_installed', 'true');
        popupTitle.innerHTML = 'Instalasi Selesai';
        popupDesc.innerHTML = 'Silakan tutup browser ini dan buka aplikasi yang telah di unduh di layar utama Anda.';
        btnInstall.style.display = 'none';
      });
    </script>
  </body>
</html>
